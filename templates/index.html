<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶翻牌遊戲</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <h1>🧠 記憶翻牌遊戲</h1>

    <div id="difficulty-select">
        <button onclick="changeDifficulty('4x4')">簡單 (4x4)</button>
        <button onclick="changeDifficulty('6x6')">困難 (6x6)</button>
    </div>

    <div id="game-info">
        <p>目前難度: <span id="current-difficulty">4x4</span></p>
        <p>時間: <span id="timer">0</span> 秒</p>
        <p>翻牌次數: <span id="flip-count">0</span> 次</p>
    </div>

    <div id="game-board"></div>

    <div id="leaderboard-section">
        <h2>🏆 英雄榜 (<span id="leaderboard-title">4x4</span>)</h2>
        <table>
            <thead>
                <tr>
                    <th>名次</th>
                    <th>玩家名稱</th>
                    <th>花費時間</th>
                    <th>翻牌次數</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                </tbody>
        </table>
    </div>

   <script src="{{ url_for('static', filename='js/game.js') }}?v=2"></script>
</body>
</html>
