<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全端記憶翻牌遊戲英雄榜</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <main class="game-area">
            <header class="game-header">
                <h1>🧠 記憶翻牌大挑戰</h1>
                <div class="control-panel">
                    <button class="btn active" onclick="switchDifficulty('4x4')">⚡ 基礎 4x4</button>
                    <button class="btn" onclick="switchDifficulty('6x6')">🔥 進階 6x6</button>
                </div>
                <div class="status-panel">
                    <div class="status-item">⏱️ 時間: <span id="timer">0</span> 秒</div>
                    <div class="status-item">✨ 翻牌: <span id="clicks">0</span> 次</div>
                </div>
            </header>

            <div class="game-board grid-4x4" id="gameBoard">
                </div>
        </main>

        <aside class="leaderboard-area">
            <div class="leaderboard-box">
                <h2>🏆 殿堂英雄榜 (<span id="currentDiffTitle">4x4</span>)</h2>
                <div class="leaderboard-header">
                    <span>名次</span>
                    <span>玩家</span>
                    <span>時間</span>
                    <span>次數</span>
                </div>
                <ul class="leaderboard-list" id="leaderboardList">
                    </ul>
            </div>
        </aside>
    </div>

    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>
</html>
